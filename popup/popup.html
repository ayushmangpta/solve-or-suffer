<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="lockScreen" class="hidden">
    <h2>Browser Locked!</h2>
    <p>You must solve your LeetCode problem before you can browse freely.</p>
    <a id="problemLink" href="#" target="_blank">Go to Problem</a>
    <button id="markPopupSolvedBtn">Mark as Solved</button>
  </div>

  <div id="mainUI">
    <h2>Solve Or Suffer</h2>
    
    <div class="tabs">
      <button id="tabCollections" class="active">Collections</button>
      <button id="tabDefaults">Defaults</button>
      <button id="tabUpload">Upload CSV</button>
    </div>

    <div id="collectionsView">
      <button id="addCollectionBtn">+ New Collection</button>
      <button id="forceLockBtn" style="background:#ff4d4d;">Force Lock Now!</button>
      <div id="collectionsList"></div>
      <div class="logo-container">
        <img src="../logos/logoclean.png" alt="Solve Or Suffer Logo" class="big-logo">
      </div>
    </div>

    <div id="uploadView" class="hidden">
      <h3>Upload CSV File</h3>
      <p>Format: problem_name, problem_link</p>
      <input type="text" id="csvCollectionName" placeholder="Collection Name" />
      <input type="file" id="csvFileInput" accept=".csv" />
      <button id="uploadBtn">Upload</button>
      <div id="uploadStatus"></div>
    </div>

    <div id="defaultCollectionsView" class="hidden">
      <h3>Add from Default Collections</h3>
      <input type="text" id="defaultSearchInput" placeholder="Search collections..." style="width: 100%; margin-bottom: 10px; padding: 5px;" />
      <div id="defaultCollectionsList" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
